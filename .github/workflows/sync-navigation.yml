name: Sync site navigation

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/sync-navigation.yml'

permissions:
  contents: write

jobs:
  sync-navigation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update navigation across HTML pages
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          nav = '''<nav class="menu" aria-label="Primary navigation"><a href="/index.html">Home</a><a href="/about.html">About</a><a href="/priorities.html">Priorities</a><a href="/resources.html">Resources</a><a href="/mental-health.html">Mental Health</a><a href="/support-team.html">Support Team</a><a href="/education/index.html">Education</a><a href="/events.html">Events</a><a href="/tour/index.html">Tour</a><a href="/volunteer.html">Volunteer</a><a href="/echo-wall.html">Echo Wall</a><a href="/media.html">Media</a><a href="/contact.html">Contact</a></nav>'''

          for path in Path('.').rglob('*.html'):
              if '.git' in path.parts:
                  continue
              text = path.read_text(encoding='utf-8')
              updated, count = re.subn(r'<nav class="menu"(?: aria-label="[^"]*")?>.*?</nav>', nav, text, count=1, flags=re.S)
              if count:
                  path.write_text(updated, encoding='utf-8')
          PY
      - name: Commit synchronized navigation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- '*.html' '**/*.html'
          if git diff --cached --quiet; then
            echo 'Navigation already synchronized.'
          else
            git commit -m 'Synchronize navigation across public pages'
            git push
          fi
